pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // GeckoView is published to Mozilla's Maven; the per-ABI 'geckoview-arm' artifact is
        // the last version (95.x) that supports armeabi-v7a, which is what the CD-18781Y is.
        maven { url = uri("https://maven.mozilla.org/maven2/") }
    }
}
rootProject.name = "ThinkViewKiosk"
include(":app")
